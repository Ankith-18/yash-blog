# CICD using GitHub actions
name: CI/CD

# Exclude the workflow from running when only manifest configurations change
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - 'k8s/**'
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Vite application
      run: npm run build
  
  # Optional Linting: You can uncomment this if you have ESLint configured for your Vite app
  # code-quality:
  #   runs-on: ubuntu-latest
  #   steps:
  #   - name: Checkout repository
  #     uses: actions/checkout@v4
  #   - name: Set up Node.js
  #     uses: actions/setup-node@v4
  #     with:
  #       node-version: 20
  #   - name: Install dependencies
  #     run: npm ci
  #   - name: Run Lint
  #     run: npm run lint --if-present

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Dynamically tags the image using your repository username and GitHub Run ID
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/yash-blog:${{ github.run_id }}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in Helm chart
      run: |
        # Correctly points to your yash-blog-chart paths inside your repository
        sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' helm/yash-blog-chart/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "ankitkr3012005@gmail.com"
        git config --global user.name "Ankith-18"
        git add helm/yash-blog-chart/values.yaml
        git commit -m "chore: update container image tag to ${{ github.run_id }} [skip ci]"
        git push
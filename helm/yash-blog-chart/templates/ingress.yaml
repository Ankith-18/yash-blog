
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minimal-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: new-blog.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: yash-blog
            port:
              number: 80
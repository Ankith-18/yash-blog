apiVersion: apps/v1
kind: Deployment
metadata:
  name: yash-blog
  labels:
    app: yash-blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yash-blog
  template:
    metadata:
      labels:
        app: yash-blog
    spec:
      containers:
      - name: yash-blog
        image: oyank/yash-blog:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
